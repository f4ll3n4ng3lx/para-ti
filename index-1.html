<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body { font-family:'Inter',sans-serif; background:#0d0d0d; color:#eaeaea; }

.hero {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at center,#1a1a1a,#0d0d0d);
  text-align:center;
  animation:fadeIn 2s ease;
}

.hero h1 {
  font-family:'Playfair Display',serif;
  font-size:2.8rem;
  margin-bottom:20px;
}

.scroll {
  margin-top:20px;
  animation:bounce 2s infinite;
  font-size:1.5rem;
  opacity:0.7;
}

section {
  padding:80px 20px;
  max-width:900px;
  margin:auto;
}

.video-container {
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  width:100%;
  height:70vh;
}

.video-container iframe {
  width:100%;
  height:100%;
  border:none;
  display:block;
}

.letter {
  background:rgba(26,26,26,0.8);
  padding:40px;
  border-radius:20px;
  line-height:1.9;
  backdrop-filter:blur(6px);
  opacity:0;
  transform:translateY(40px);
  transition:all 1.5s ease;
}

.letter.visible {
  opacity:1;
  transform:translateY(0);
}

.letter h2 {
  font-family:'Playfair Display',serif;
  margin-bottom:25px;
  font-size:1.8rem;
}

.letter p + p { margin-top:1.2em; }

footer {
  text-align:center;
  padding:60px 20px;
  opacity:0.6;
  font-size:0.9rem;
}

.fade {
  opacity:0;
  transform:translateY(30px);
  transition:all 1.2s ease;
}

.fade.visible {
  opacity:1;
  transform:translateY(0);
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes bounce {
  0%,100% {transform:translateY(0);}
  50% {transform:translateY(12px);}
}
</style>
</head>

<body>

<div class="hero">
  <h1>esto es para ti</h1>
  <div class="scroll">↓</div>
</div>

<section class="fade">
  <div class="video-container">
    <iframe 
      src="https://drive.google.com/file/d/1kAc-0f8-dUsXk7mqiZBvy8E4gj23s7Xe/preview"
      width="100%"
      height="100%"
      allow="autoplay">
    </iframe>
  </div>
</section>

<section>
  <div class="letter fade">
    <h2>para ti</h2>

    <p>
      no sé si alguna vez te lo dije así, pero conocerte fue como empezar a ver colores
      donde antes no había… como si todo de pronto tuviera más sentido contigo.
    </p>

    <p>
      si alguna vez dudas de lo que significas para mí, vuelve aquí 𖹭
    </p>

  </div>
</section>

<footer>
  <p>gracias por existir</p>
</footer>

<script>
if ('IntersectionObserver' in window) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });

  document.querySelectorAll('.fade').forEach(el => observer.observe(el));
} else {
  document.querySelectorAll('.fade').forEach(el => el.classList.add('visible'));
}
</script>

</body>
</html>
